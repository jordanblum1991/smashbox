# Fly.io app config. Single-machine deployment. The app DB is Fly Managed
# Postgres (since the 2026-06 cutover — see CLAUDE.md); the persistent volume
# now holds only uploaded files + Excel exports + the legacy SQLite rollback.
# Suitable for small finance-team usage; revisit multi-instance if usage grows.

app = "smashbox"
primary_region = "lax"  # Los Angeles

[build]

# Run Alembic migrations before each release goes live. Runs in a temporary
# machine with the app's secrets (incl. DATABASE_URL → Postgres); a failed
# migration aborts the deploy so bad schema never reaches users. NOTE: the
# Postgres DB must be stamped at the baseline revision once before the first
# release_command deploy (`alembic stamp 07c4ee33b7fa`), or upgrade-from-zero
# would try to re-create the already-existing tables.
[deploy]
  release_command = "alembic upgrade head"

[env]
  PORT = "8000"
  DATA_DIR = "/data"
  UPLOAD_DIR = "/data/uploads"
  EXPORT_DIR = "/data/exports"

# Force HTTPS, auto-issue cert, redirect HTTP → HTTPS.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"     # cost saver: machine sleeps after idle
  auto_start_machines = true      # wakes on first request (~5s cold start)
  min_machines_running = 1        # keep one warm so the dashboard feels snappy

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  # NOTE: a /healthz liveness check is intentionally NOT wired up yet. Fly caps
  # the check grace_period at 60s, but cold start is ~57s — too thin a margin, so
  # a slow boot could boot-loop. The app exposes /healthz (DB-free, auth-exempt)
  # ready to use; enable the check here once cold-start time is safely under 60s.

# One shared-cpu-1x VM, 512MB RAM — plenty for an internal dashboard.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Persistent volume for SQLite + uploads + exports. Survives deploys, restarts,
# and machine moves. Volumes are zone-pinned so we deploy in the same region.
[[mounts]]
  source = "smashbox_data"
  destination = "/data"
