<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Smashbox{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tailwind.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-800 antialiased">
  {% include "partials/nav.html" %}
  <main class="mx-auto max-w-7xl px-6 py-8 print:max-w-none print:px-0 print:py-0">
    {% block content %}{% endblock %}
  </main>
  <footer class="mx-auto max-w-7xl px-6 pb-10 text-xs text-slate-400 print:hidden">
    Smashbox internal · {{ today.year if today else "" }}
  </footer>
</body>
</html>
