<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Smashbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'] } } } }
  </script>
</head>
<body class="min-h-screen bg-slate-100 font-sans text-slate-800 antialiased">
  <main class="flex min-h-screen items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="mb-6 text-center">
        <div class="mx-auto mb-3 flex h-10 w-10 items-center justify-center rounded-xl bg-slate-900 text-white">
          <span class="text-sm font-bold">S</span>
        </div>
        <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Sign in to Smashbox</h1>
        <p class="mt-1.5 text-sm text-slate-500">Internal TikTok Shop P&amp;L &amp; reporting</p>
      </div>

      <form method="post" action="/login"
            class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        {% if error %}
        <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-900">
          {{ error }}
        </div>
        {% endif %}

        <input type="hidden" name="next" value="{{ next }}">

        <label class="block">
          <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Email</span>
          <input type="email" name="email" required autofocus autocomplete="username"
                 class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
        </label>

        <label class="mt-4 block">
          <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Password</span>
          <input type="password" name="password" required autocomplete="current-password"
                 class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
        </label>

        <button type="submit"
                class="mt-5 w-full rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition hover:bg-slate-800">
          Sign in
        </button>
      </form>

      <p class="mt-4 text-center text-xs text-slate-400">
        Forgot your password? Ask an admin to reset it.
      </p>
    </div>
  </main>
</body>
</html>
