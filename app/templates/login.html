<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Smashbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tailwind.css?v={{ static_v }}">
</head>
<body class="min-h-screen bg-slate-100 font-sans text-slate-800 antialiased">
  <main class="flex min-h-screen items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="mb-6 text-center">
        <div class="mx-auto mb-3 flex h-10 w-10 items-center justify-center rounded-xl bg-slate-900 text-white">
          <span class="text-sm font-bold">S</span>
        </div>
        <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Sign in to Smashbox</h1>
        <p class="mt-1.5 text-sm text-slate-500">Internal TikTok Shop P&amp;L &amp; reporting</p>
      </div>

      <form method="post" action="/login"
            class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        {% if error %}
        <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-900">
          {{ error }}
        </div>
        {% endif %}

        <input type="hidden" name="next" value="{{ next }}">

        <label class="block">
          <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Email</span>
          <input type="email" name="email" required autofocus autocomplete="username"
                 class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
        </label>

        <label class="mt-4 block">
          <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Password</span>
          <input type="password" name="password" required autocomplete="current-password"
                 class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500">
        </label>

        <button type="submit"
                class="mt-5 w-full rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition hover:bg-slate-800">
          Sign in
        </button>

        {% if google_enabled %}
        <div class="mt-5 flex items-center gap-3">
          <span class="h-px flex-1 bg-slate-200"></span>
          <span class="text-xs text-slate-400">or</span>
          <span class="h-px flex-1 bg-slate-200"></span>
        </div>
        <a href="/auth/google/login"
           class="mt-4 flex w-full items-center justify-center gap-2.5 rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50">
          <svg class="h-4 w-4" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Sign in with Google
        </a>
        {% endif %}
      </form>

      <p class="mt-4 text-center text-xs text-slate-400">
        Forgot your password? Ask an admin to reset it.
      </p>
    </div>
  </main>
</body>
</html>
